services:
  postgres:
    image: postgres:16-alpine
    container_name: lts-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lts
      POSTGRES_PASSWORD: lts
      POSTGRES_DB: lts
    ports:
      - "5432:5432"
    volumes:
      - lts-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lts -d lts"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: lts-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - lts-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  lts-postgres-data:
  lts-redis-data:
