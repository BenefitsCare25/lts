name: CI / CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Opt JS-based actions into Node.js 24. Becomes the default June 2026;
# setting this now silences deprecation warnings without waiting.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# ---------------------------------------------------------------------------
# Required GitHub repository secrets (Settings → Secrets → Actions):
#
#   AZURE_CLIENT_ID                          App Registration client ID (OIDC federated cred)
#   AZURE_TENANT_ID                          Azure tenant ID (for OIDC login)
#   AZURE_SUBSCRIPTION_ID                    Azure subscription ID
#   POSTGRES_ADMIN_PASSWORD                  Passed to Bicep when deployPostgres=true
#   AUTH_SECRET                              NextAuth signing secret. Without it, login
#                                            fails with "server configuration problem".
#   APP_SECRET_KEY                           AES-256-GCM master key for the app-level
#                                            cipher (server/security/secret-cipher).
#                                            Encrypts TenantAiProvider keys at rest.
#                                            Rotating breaks decryption of every row
#                                            written under the prior key — generate
#                                            once with `openssl rand -base64 48`.
#   SHAREPOINT_TENANT_ID                     Distinct from AZURE_TENANT_ID — the tenant
#                                            hosting the SharePoint app registration
#   SHAREPOINT_CLIENT_ID                     SharePoint app registration client ID
#   SHAREPOINT_CLIENT_SECRET                 SharePoint app registration client secret
#   SHAREPOINT_SERVICE_ACCOUNT_USERNAME      Service account UPN (e.g. BenefitsCare@…)
#   SHAREPOINT_SERVICE_ACCOUNT_PASSWORD      Service account password
#
# The SHAREPOINT_* secrets are passed to Bicep, which writes them to the
# Container App secret bag and exposes them as AZURE_TENANT_ID / AZURE_CLIENT_ID
# / AZURE_CLIENT_SECRET / AZURE_SERVICE_ACCOUNT_USERNAME / AZURE_SERVICE_ACCOUNT_PASSWORD
# inside the running container — the names the SharePoint module already reads.
# Repo secret names are SHAREPOINT_* to keep them distinct from the OIDC
# AZURE_* secrets used for `azure/login@v2`.
#
# One-time OIDC setup (run once, replace <client-id> and <sub-id>):
#
#   az ad sp create-for-rbac --name "lts-github-oidc" --role Contributor \
#     --scopes /subscriptions/<sub-id>/resourceGroups/insurance-saas-staging-rg
#
#   az ad app federated-credential create --id <client-id> --parameters '{
#     "name": "github-push-main",
#     "issuer": "https://token.actions.githubusercontent.com",
#     "subject": "repo:BenefitsCare25/lts:ref:refs/heads/main",
#     "audiences": ["api://AzureADTokenExchange"]
#   }'
# ---------------------------------------------------------------------------

jobs:
  # ---------------------------------------------------------------------------
  # lint — Biome + TypeScript + Bicep syntax. No DB needed; runs fast.
  # ---------------------------------------------------------------------------
  lint:
    name: lint • typecheck • bicep
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack
        run: corepack enable

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome check (lint + format)
        run: pnpm check

      - name: Typecheck
        run: pnpm typecheck

      - name: Bicep compile (infra/)
        # Compile-check the Azure templates on every push. Catches syntax
        # errors and lint warnings before they hit a real deployment.
        run: az bicep build --file infra/bicep/main.bicep --stdout > /dev/null

  # ---------------------------------------------------------------------------
  # test — migrations + Vitest. Runs in parallel with lint.
  # next build is intentionally omitted — the Docker build in the deploy job
  # covers it, and the GHA layer cache makes it fast on repeat pushes.
  # ---------------------------------------------------------------------------
  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      # Postgres for integration tests (cross-tenant isolation suite).
      # The DB is ephemeral per job — no persistence, no shared state.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: insurance_saas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/insurance_saas_test?schema=public
      INTEGRATION_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/insurance_saas_test?schema=public
      REDIS_URL: redis://localhost:6379
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack
        run: corepack enable

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply migrations to test DB
        run: pnpm prisma migrate deploy

      - name: Unit + integration tests
        run: pnpm test

  # ---------------------------------------------------------------------------
  # deploy — builds image, migrates, seeds (if schema changed), deploys.
  # ---------------------------------------------------------------------------
  deploy:
    name: deploy → staging
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      id-token: write  # required for OIDC Azure login
      contents: read

    env:
      RESOURCE_GROUP: insurance-saas-staging-rg
      CONTAINER_APP: insurance-saas-staging-web
      PARAM_FILE: infra/bicep/staging.parameters.json
      TEMPLATE_FILE: infra/bicep/main.bicep

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for accurate infra + migration diff

      - name: Detect infra changes
        id: infra
        run: |
          # Only deployment-relevant files trigger the slow full-Bicep
          # path. Docs/READMEs/markdown inside infra/ are intentionally
          # excluded — touching one used to redeploy the entire ARM
          # template AND clobber Container App secrets with whatever
          # happened to be in GitHub Actions secrets at the time.
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            DIFF=$(git diff --name-only "$BEFORE" "${{ github.sha }}" -- 'infra/**/*.bicep' 'infra/**/*.json' 2>/dev/null || true)
            [ -n "$DIFF" ] && echo "changed=true" >> "$GITHUB_OUTPUT" || echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect migration changes
        id: migrations
        run: |
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            DIFF=$(git diff --name-only "$BEFORE" "${{ github.sha }}" -- prisma/ 2>/dev/null || true)
            [ -n "$DIFF" ] && echo "changed=true" >> "$GITHUB_OUTPUT" || echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve ACR
        id: acr
        run: |
          ACR_NAME=$(az acr list --resource-group "$RESOURCE_GROUP" --query '[0].name' -o tsv)
          ACR_SERVER=$(az acr show --name "$ACR_NAME" --query loginServer -o tsv)
          echo "name=$ACR_NAME" >> "$GITHUB_OUTPUT"
          echo "server=$ACR_SERVER" >> "$GITHUB_OUTPUT"

      - name: Get ACR token
        id: acr-token
        run: |
          TOKEN=$(az acr login --name "${{ steps.acr.outputs.name }}" \
            --expose-token --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.acr.outputs.server }}
          username: 00000000-0000-0000-0000-000000000000
          password: ${{ steps.acr-token.outputs.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.acr.outputs.server }}/insurance-saas-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup Node (for prisma migrate + seed)
        if: steps.migrations.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack
        if: steps.migrations.outputs.changed == 'true'
        run: corepack enable

      - name: Install Prisma deps
        if: steps.migrations.outputs.changed == 'true'
        run: pnpm install --frozen-lockfile --ignore-scripts && pnpm exec prisma generate

      - name: Migrate + seed staging Postgres
        if: steps.migrations.outputs.changed == 'true'
        env:
          AZURE_CONTAINERAPP: ${{ env.CONTAINER_APP }}
        run: |
          DB_URL=$(az containerapp secret show \
            --name "$CONTAINER_APP" \
            --resource-group "$RESOURCE_GROUP" \
            --secret-name database-url \
            --query value -o tsv)
          echo "::add-mask::$DB_URL"
          export DATABASE_URL="$DB_URL"
          pnpm prisma migrate deploy
          pnpm prisma db seed

      - name: Deploy — update image only (fast path)
        if: steps.infra.outputs.changed == 'false'
        run: |
          az containerapp update \
            --name "$CONTAINER_APP" \
            --resource-group "$RESOURCE_GROUP" \
            --image "${{ steps.acr.outputs.server }}/insurance-saas-web:${{ github.sha }}"
          echo "Fast deploy complete — image updated, Bicep skipped."

      - name: Verify deploy secrets before Bicep
        if: steps.infra.outputs.changed == 'true'
        env:
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          SHAREPOINT_TENANT_ID: ${{ secrets.SHAREPOINT_TENANT_ID }}
          SHAREPOINT_CLIENT_ID: ${{ secrets.SHAREPOINT_CLIENT_ID }}
          SHAREPOINT_CLIENT_SECRET: ${{ secrets.SHAREPOINT_CLIENT_SECRET }}
          SHAREPOINT_SERVICE_ACCOUNT_USERNAME: ${{ secrets.SHAREPOINT_SERVICE_ACCOUNT_USERNAME }}
          SHAREPOINT_SERVICE_ACCOUNT_PASSWORD: ${{ secrets.SHAREPOINT_SERVICE_ACCOUNT_PASSWORD }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          APP_SECRET_KEY: ${{ secrets.APP_SECRET_KEY }}
        # Bicep's `az deployment group create` faithfully writes whatever
        # value we pass for each secret param into the Container App's
        # secret bag, overwriting whatever was there. A placeholder /
        # empty / mis-set GitHub Actions secret silently kills the
        # running app on the next revision boot. Fail loud here BEFORE
        # we touch live infra. Length thresholds match production env
        # validation in apps/web/src/server/env/*.ts and Azure resource
        # password policies. Values are never echoed — only lengths.
        run: |
          fail=0
          check() {
            local name="$1" min_len="$2" value="$3"
            local len=${#value}
            if [ "$len" -lt "$min_len" ]; then
              echo "::error::GitHub repo secret $name is $len chars; required >= $min_len. Bicep would silently overwrite the live Container App secret with this junk value and kill the running app. Fix via 'gh secret set $name' before re-running this deploy."
              fail=1
            else
              echo "$name: $len chars (ok)"
            fi
          }
          check AUTH_SECRET 32 "$AUTH_SECRET"
          check APP_SECRET_KEY 32 "$APP_SECRET_KEY"
          check POSTGRES_ADMIN_PASSWORD 16 "$POSTGRES_ADMIN_PASSWORD"
          check SHAREPOINT_TENANT_ID 30 "$SHAREPOINT_TENANT_ID"
          check SHAREPOINT_CLIENT_ID 30 "$SHAREPOINT_CLIENT_ID"
          check SHAREPOINT_CLIENT_SECRET 20 "$SHAREPOINT_CLIENT_SECRET"
          check SHAREPOINT_SERVICE_ACCOUNT_USERNAME 5 "$SHAREPOINT_SERVICE_ACCOUNT_USERNAME"
          check SHAREPOINT_SERVICE_ACCOUNT_PASSWORD 8 "$SHAREPOINT_SERVICE_ACCOUNT_PASSWORD"
          if [ "$fail" -eq 1 ]; then
            echo "::error::One or more deploy secrets failed validation. Aborting Bicep deploy to prevent clobbering live Container App secrets."
            exit 1
          fi
          echo "All deploy secrets pass length checks."

      - name: Deploy — full Bicep (infra changed)
        if: steps.infra.outputs.changed == 'true'
        env:
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          SHAREPOINT_TENANT_ID: ${{ secrets.SHAREPOINT_TENANT_ID }}
          SHAREPOINT_CLIENT_ID: ${{ secrets.SHAREPOINT_CLIENT_ID }}
          SHAREPOINT_CLIENT_SECRET: ${{ secrets.SHAREPOINT_CLIENT_SECRET }}
          SHAREPOINT_SERVICE_ACCOUNT_USERNAME: ${{ secrets.SHAREPOINT_SERVICE_ACCOUNT_USERNAME }}
          SHAREPOINT_SERVICE_ACCOUNT_PASSWORD: ${{ secrets.SHAREPOINT_SERVICE_ACCOUNT_PASSWORD }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          APP_SECRET_KEY: ${{ secrets.APP_SECRET_KEY }}
        run: |
          az deployment group create \
            --name "staging-$(date -u +%Y%m%d-%H%M%S)" \
            --resource-group "$RESOURCE_GROUP" \
            --template-file "$TEMPLATE_FILE" \
            --parameters "@${PARAM_FILE}" \
            --parameters "appImage=${{ steps.acr.outputs.server }}/insurance-saas-web:${{ github.sha }}" \
            --parameters "postgresAdminPassword=${POSTGRES_ADMIN_PASSWORD}" \
            --parameters "sharepointTenantId=${SHAREPOINT_TENANT_ID}" \
            --parameters "sharepointClientId=${SHAREPOINT_CLIENT_ID}" \
            --parameters "sharepointClientSecret=${SHAREPOINT_CLIENT_SECRET}" \
            --parameters "sharepointServiceAccountUsername=${SHAREPOINT_SERVICE_ACCOUNT_USERNAME}" \
            --parameters "sharepointServiceAccountPassword=${SHAREPOINT_SERVICE_ACCOUNT_PASSWORD}" \
            --parameters "authSecret=${AUTH_SECRET}" \
            --parameters "appSecretKey=${APP_SECRET_KEY}" \
            --output none
          echo "Full Bicep deploy complete."
