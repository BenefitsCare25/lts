name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint • typecheck • test • build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Phase 1 bootstrap: no migrations applied, so this URL is only used
      # by tooling that needs *some* value. Real DB-backed tests in S6+
      # will spin up a Postgres service in this workflow.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/insurance_saas?schema=public
      REDIS_URL: redis://localhost:6379
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack
        run: corepack enable

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome check (lint + format)
        run: pnpm check

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit + integration tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Bicep compile (infra/)
        # Compile-check the Azure templates on every push. Catches syntax
        # errors and lint warnings before they hit a real deployment.
        run: az bicep build --file infra/bicep/main.bicep --stdout > /dev/null
